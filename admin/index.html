<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Origin Admin</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body>
    <header id="adminHeader" class="site-header admin-header" hidden>
      <div>
        <p class="eyebrow">Firebase Admin</p>
        <h1>咖啡豆後台</h1>
        <p class="subhead">登入後可直接新增、編輯、刪除 Firestore 裡的咖啡豆資料。更新後前台不需要重新部署。</p>
      </div>
      <a class="admin-link" href="/">回前台</a>
    </header>

    <main>
      <section id="loginPanel" class="card login-panel login-only">
        <h2>登入</h2>
        <form id="loginForm" class="login-form">
          <label>Email<input id="email" type="email" autocomplete="email" required /></label>
          <label>Password<input id="password" type="password" autocomplete="current-password" required /></label>
          <button type="submit">登入</button>
        </form>
        <p id="loginMessage" class="message"></p>
      </section>

      <section id="adminPanel" class="admin-layout" hidden>
        <aside class="card sidebar">
          <div class="admin-actions">
            <button id="newBeanBtn" type="button">新增咖啡豆</button>
            <button id="logoutBtn" class="secondary" type="button">登出</button>
          </div>
          <p id="userLabel" class="muted"></p>
          <div id="beanList" class="bean-list"></div>
        </aside>

        <section class="card editor-card">
          <div class="editor-top">
            <div>
              <p class="eyebrow">Editor</p>
              <h2 id="editorTitle">新增咖啡豆</h2>
            </div>
            <p id="saveMessage" class="message"></p>
          </div>

          <form id="beanForm" class="bean-form">
            <input type="hidden" name="id" />

            <div class="form-section">
              <h3>基本資料</h3>
              <div class="form-grid">
                <label>咖啡豆名稱<input name="name" required /></label>
                <label>Slug<input name="slug" placeholder="panama-geisha-demo" /></label>
                <label>國家<input name="country" /></label>
                <label>產區<input name="region" /></label>
                <label>子產區<input name="subregion" /></label>
                <label>莊園 / 合作社<input name="farm" /></label>
                <label>生產者<input name="producer" /></label>
                <label>品種<input name="variety" /></label>
                <label>處理法<input name="process" /></label>
                <label>海拔<input name="altitude" /></label>
                <label>烘焙度<input name="roastLevel" /></label>
                <label>杯測分數<input name="cuppingScore" type="number" step="0.01" /></label>
              </div>
              <label class="checkbox-label"><input name="published" type="checkbox" /> Published｜公開顯示在前台</label>
            </div>

            <div class="form-section">
              <h3>Best of Panama / 拍賣欄位</h3>
              <div class="form-grid">
                <label>競賽 / 拍賣名稱<input name="competitionName" /></label>
                <label>類別<input name="category" /></label>
                <label>Lot 編號<input name="lotNumber" /></label>
                <label>排名<input name="rank" /></label>
                <label>得標價格<input name="bidPrice" /></label>
                <label>得標者<input name="winningBidder" /></label>
              </div>
            </div>

            <div class="form-section">
              <h3>風味資料</h3>
              <label>官方風味描述<textarea name="officialFlavor" rows="3"></textarea></label>
              <label>主要風味標籤<textarea name="flavorNotes" rows="2" placeholder="jasmine, bergamot, honey"></textarea></label>
              <label>系統標籤<textarea name="tags" rows="2" placeholder="花香 | 高酸 | 清爽"></textarea></label>
              <div class="form-grid scores-grid">
                <label>酸質 0-5<input name="acidityScore" type="number" step="0.1" min="0" max="5" /></label>
                <label>甜感 0-5<input name="sweetnessScore" type="number" step="0.1" min="0" max="5" /></label>
                <label>苦感 0-5<input name="bitternessScore" type="number" step="0.1" min="0" max="5" /></label>
                <label>醇厚度 0-5<input name="bodyScore" type="number" step="0.1" min="0" max="5" /></label>
                <label>香氣 0-5<input name="aromaScore" type="number" step="0.1" min="0" max="5" /></label>
                <label>餘韻 0-5<input name="aftertasteScore" type="number" step="0.1" min="0" max="5" /></label>
                <label>發酵感 0-5<input name="fermentationScore" type="number" step="0.1" min="0" max="5" /></label>
                <label>乾淨度 0-5<input name="cleanScore" type="number" step="0.1" min="0" max="5" /></label>
              </div>
            </div>

            <div class="form-section">
              <h3>產地地圖</h3>
              <div class="form-grid">
                <label>Latitude 緯度<input name="latitude" type="number" step="any" /></label>
                <label>Longitude 經度<input name="longitude" type="number" step="any" /></label>
                <label>地圖精準度
                  <select name="mapAccuracy">
                    <option value="">未確認</option>
                    <option value="country">國家層級</option>
                    <option value="region">產區層級</option>
                    <option value="subregion">子產區層級</option>
                    <option value="farm">莊園層級</option>
                  </select>
                </label>
              </div>
            </div>

            <div class="form-section">
              <h3>沖煮建議</h3>
              <div class="form-grid">
                <label>沖煮法<input name="brewMethod" /></label>
                <label>粉水比<input name="brewRatio" /></label>
                <label>水溫<input name="brewTemp" /></label>
                <label>研磨度<input name="grind" /></label>
                <label>萃取時間<input name="brewTime" /></label>
              </div>
            </div>

            <div class="form-section">
              <h3>故事與資料來源</h3>
              <label>產地背景<textarea name="storyOrigin" rows="4"></textarea></label>
              <label>生產者 / 莊園故事<textarea name="storyProducer" rows="4"></textarea></label>
              <label>處理法說明<textarea name="processNote" rows="4"></textarea></label>
              <label>官方資料來源<textarea name="sourceOfficial" rows="2" placeholder="URL / 包裝 / 烘豆商資料"></textarea></label>
              <label>杯測 / 品飲來源<textarea name="sourceCupping" rows="2"></textarea></label>
              <label>個人品飲筆記來源<textarea name="sourcePersonal" rows="2"></textarea></label>
            </div>

            <div class="form-actions sticky-actions">
              <button type="submit">儲存到 Firestore</button>
              <button id="deleteBtn" type="button" class="danger" hidden>刪除這筆</button>
              <button id="resetBtn" type="button" class="secondary">清空表單</button>
            </div>
          </form>
        </section>

        <section class="card import-card">
          <div>
            <p class="eyebrow">Batch Import</p>
            <h2>CSV 批量匯入</h2>
            <p class="muted">用 Google Sheets / Excel 整理後匯出 CSV，再從這裡匯入 Firestore。欄位名稱要放在第一列。</p>
          </div>
          <div class="import-actions">
            <button id="downloadTemplateBtn" type="button" class="secondary">下載 CSV 範本</button>
            <input id="csvFile" type="file" accept=".csv,text/csv" />
            <button id="importCsvBtn" type="button">匯入 CSV</button>
          </div>
          <pre id="importLog" class="import-log"></pre>
        </section>
      </section>
    </main>

    <script type="module" src="/admin/admin.js"></script>
  </body>
</html>
