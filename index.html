<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Receipt Studio</title>
    <meta name="description" content="Source-based coffee bean receipt card powered by Firebase Firestore." />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="receipt-page factual-mode">
    <header class="topbar">
      <div>
        <p class="eyebrow">Coffee Receipt Studio</p>
        <h1>咖啡豆資料收據</h1>
      </div>
      <a class="admin-link" href="/admin/">Admin</a>
    </header>

    <main class="receipt-shell">
      <section class="toolbar card">
        <label for="beanSelect">選擇咖啡豆</label>
        <select id="beanSelect"></select>
        <span id="statusText" class="muted">讀取資料中…</span>
      </section>

      <section id="emptyState" class="card empty-state" hidden>
        <h2>目前還沒有公開的咖啡豆資料</h2>
        <p>請到 <a href="/admin/">/admin</a> 登入後新增資料，並將 published 設為 true。</p>
      </section>

      <article id="beanCard" class="receipt factual-receipt" hidden>
        <section class="receipt-head">
          <h2>咖啡豆資料收據</h2>
          <p class="receipt-subtitle">SOURCE DATA RECEIPT</p>
          <h3 id="beanName">Coffee Bean</h3>
          <p id="beanProducer">Producer</p>
          <div id="scorePill" class="receipt-score" hidden>
            <span id="cuppingScore">--</span>
            <small>CUPPING</small>
          </div>
          <div id="heroFacts" class="hero-facts"></div>
        </section>

        <div id="receiptSections"></div>

        <footer class="receipt-footer">
          <p>資料只依來源與後台欄位呈現</p>
        </footer>
      </article>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
