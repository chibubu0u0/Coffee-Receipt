<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Coffee origin card with verified origin, flavor, brewing, and source data." />
    <title>Coffee Origin Card</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQAb6SSqGg1NyVPBKgyyN4tZt8PzN6w=" crossorigin="" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">Coffee Origin Archive</p>
        <h1>咖啡豆資料卡</h1>
        <p class="lead">用產地、風味、沖煮建議與資料來源，建立一張可被掃描收藏的咖啡豆卡片。</p>
      </div>
      <a class="admin-link" href="/admin">Admin</a>
    </header>

    <main class="layout">
      <aside class="bean-list-panel">
        <div class="panel-title-row">
          <h2>Beans</h2>
          <span id="beanCount" class="count-pill">0</span>
        </div>
        <div id="beanList" class="bean-list" aria-label="Coffee bean list"></div>
      </aside>

      <section class="card-shell" aria-live="polite">
        <div id="emptyState" class="empty-state" hidden>
          <h2>找不到咖啡豆資料</h2>
          <p>請確認 <code>data/beans.json</code> 內至少有一筆 <code>published: true</code> 的資料。</p>
        </div>

        <article id="beanCard" class="bean-card" hidden>
          <section class="hero-card">
            <div>
              <p class="eyebrow" id="competitionLabel">Origin Card</p>
              <h2 id="beanName"></h2>
              <p id="beanSubtitle" class="subtitle"></p>
              <div class="meta-grid compact" id="heroMeta"></div>
            </div>
            <div class="qr-box">
              <div id="qrCode" class="qr-code"></div>
              <p>Scan for this card</p>
            </div>
          </section>

          <section class="two-column">
            <div class="panel map-panel">
              <div class="section-heading">
                <p class="eyebrow">Origin Map</p>
                <h3 id="originTitle"></h3>
              </div>
              <div id="map" class="map"></div>
              <p id="mapAccuracy" class="small-note"></p>
              <p id="originNotes" class="body-copy"></p>
            </div>

            <div class="panel">
              <div class="section-heading">
                <p class="eyebrow">Coffee Data</p>
                <h3>基本資料</h3>
              </div>
              <dl id="coffeeFacts" class="fact-list"></dl>
            </div>
          </section>

          <section class="panel">
            <div class="section-heading">
              <p class="eyebrow">Flavor Profile</p>
              <h3>風味與感官數據</h3>
            </div>
            <div id="flavorTags" class="tag-row"></div>
            <p id="flavorDescription" class="body-copy"></p>
            <div class="flavor-grid">
              <dl id="flavorFacts" class="fact-list"></dl>
              <div id="scoreBars" class="score-bars"></div>
            </div>
          </section>

          <section class="two-column">
            <div class="panel">
              <div class="section-heading">
                <p class="eyebrow">Brew Guide</p>
                <h3>沖煮建議</h3>
              </div>
              <dl id="brewFacts" class="fact-list"></dl>
            </div>
            <div class="panel">
              <div class="section-heading">
                <p class="eyebrow">Story & Traceability</p>
                <h3>背景故事</h3>
              </div>
              <div id="storyBlocks" class="story-blocks"></div>
            </div>
          </section>

          <section class="panel source-panel">
            <div class="section-heading">
              <p class="eyebrow">Sources</p>
              <h3>資料來源與推導說明</h3>
            </div>
            <dl id="sourceFacts" class="fact-list"></dl>
          </section>
        </article>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
